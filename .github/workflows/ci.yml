name: ci

# Enterprise CI gate for egl-utils-js, generated by EADOS.
# Implements the quality bar in AGENTS.md §10 across the toolchain matrix from the
# language profile. The build/test/format/lint commands come from project.yaml; the
# setup steps and language-specific extra jobs come from the profile.

on:
  pull_request:
  push:
    branches: [main]
  workflow_call:

permissions:
  contents: read

# Cancel superseded runs on a PR; never cancel a run on main (its history matters).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ---------------------------------------------------------------------------
  # Cross-platform build + test matrix (from the language profile).
  # ---------------------------------------------------------------------------
  build:
    name: build / ${{ matrix.os }} / ${{ matrix.toolchain }} / ${{ matrix.preset }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-24.04, toolchain: node-18, preset: default }
          - { os: ubuntu-24.04, toolchain: node-20, preset: default }
          - { os: ubuntu-24.04, toolchain: node-22, preset: default }
    steps:
      - name: Check out the source tree
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: pnpm/action-setup@v6
      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.toolchain == 'node-18' && '18' || matrix.toolchain == 'node-22' && '22' || '20' }}
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        shell: bash
        run: pnpm build

      # `pnpm coverage` = vitest run --coverage: runs the full suite AND
      # enforces the NFR-03 thresholds (>= 95% lines/branches) from
      # vitest.config.js on every Node cell of the matrix (roadmap 2.6).
      # Timing gates (*.redos.test.js) are excluded there and run separately,
      # UN-instrumented — coverage instrumentation would time itself.
      - name: Test (coverage gate >= 95%)
        shell: bash
        run: pnpm coverage

      - name: ReDoS gate (NFR-05, un-instrumented)
        shell: bash
        run: pnpm test:redos

  # ---------------------------------------------------------------------------
  # Cross-artifact congruence — the agent-runnable consistency lint.
  # ---------------------------------------------------------------------------
  consistency:
    name: consistency / lint
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0          # i18n/version checks need full history
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'
      - name: Run the consistency lint
        run: python tools/consistency_lint.py

  # ---------------------------------------------------------------------------
  # Language-specific quality jobs (format, lint, sanitizers, …) from the profile.
  # ---------------------------------------------------------------------------
  lint:
    name: lint / eslint + prettier
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: pnpm/action-setup@v6
      - name: Set up Node.js
        uses: actions/setup-node@v7
        with: { node-version: '20', cache: pnpm }
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # Invoke the package.json scripts so CI and local runs stay congruent
      # (single source of truth). `lint` is eslint --max-warnings 0 followed by
      # tsc --noEmit — the JSDoc checkJs type-soundness gate.
      - name: Check formatting
        run: pnpm format:check
      - name: Lint and type-check
        run: pnpm lint

  # Publishing gates — validate the built package's exports map, types
  # resolution, bundle budgets, tree-shakeability, and dependency policy
  # (NFR-01/02/06). Single-job on Node 20: these tools validate the built
  # artifact (Node-version-independent) and require Node >= 20, while the
  # library's Node 18 runtime floor is verified by the build/test matrix above.
  packaging:
    name: packaging / exports + budgets
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: pnpm/action-setup@v6
      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Validate package publishing config (publint)
        run: pnpm check:publint
      - name: Validate types resolution across the exports map (arethetypeswrong)
        run: pnpm check:exports
      - name: Enforce bundle-size budgets (NFR-01)
        run: pnpm size
      - name: Assert tree-shakeability (NFR-02)
        run: pnpm check:shakeable
      - name: Assert zero runtime dependencies (NFR-06)
        run: pnpm check:deps

  # Reproducible performance gate — runs only when the project has a benchmark suite.
  benchmark:
    name: benchmark / reproducible perf
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: pnpm/action-setup@v6
      - name: Set up Node.js
        uses: actions/setup-node@v7
        # Single-job (no matrix): benchmarks run on one Node to keep baselines
        # comparable. The real suite lands with roadmap 7.1.
        with:
          node-version: '20'
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run the benchmark suite
        shell: bash
        run: pnpm bench


