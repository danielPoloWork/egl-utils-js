name: release

# Release workflow for egl-utils-js, generated by EADOS.
# Fires on an annotated SemVer tag push and prepares a *draft* GitHub Release. Publishing is
# the deliberate human checkpoint (AGENTS.md §11 / docs/workflow/release.md) — this workflow
# never publishes, it only drafts so a maintainer can review and press "Publish".

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

# Serialize per-tag, but NEVER cancel an in-flight release — a half-run publish is worse
# than a queued one.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  draft-release:
    name: draft GitHub Release for ${{ github.ref_name }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out the tagged tree
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.toolchain == 'node-18' && '18' || matrix.toolchain == 'node-22' && '22' || '20' }}
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (verify the tag builds clean)
        shell: bash
        run: pnpm build

      - name: Draft the release (a human publishes it)
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
